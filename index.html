<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Game - Advanced Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }
        .header {
            width: 90%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .player-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .timer {
            font-size: 20px;
            font-weight: bold;
            min-width: 60px;
        }
        #player1 { color: red; }
        #player2 { color: white; }
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 140px);
            grid-template-rows: repeat(3, 140px);
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .box {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 15px;
            font-size: 80px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .box.x {
            color: red;
            animation: drawX 0.5s ease;
        }
        .box.o {
            color: white;
            background: #333;
            animation: drawO 0.5s ease;
        }
        @keyframes drawX {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
        @keyframes drawO {
            0% { transform: scale(0) rotate(0deg); border-radius: 50%; }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); border-radius: 15px; }
        }
        .winner-animation {
            animation: celebrate 1s infinite;
        }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); background: gold; box-shadow: 0 0 30px gold; }
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 200px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #startBtn { background: #4CAF50; color: white; font-size: 24px; }
        #restartBtn { background: #2196F3; color: white; }
        #backBtn { background: #FF9800; color: white; }
        #gameOverMsg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 20px;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .move-selector {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .move-selector.hidden {
            display: none;
        }
        .status {
            font-size: 24px;
            margin-bottom: 10px;
        }
        audio { display: none; }
        .pulse {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="player-info">
            <div>Player 1 (X)</div>
            <div id="timer1" class="timer">00</div>
        </div>
        <h1 style="font-size: 32px;">XO GAME</h1>
        <div class="player-info">
            <div>Player 2 (O)</div>
            <div id="timer2" class="timer">00</div>
        </div>
    </div>

    <div class="game-container">
        <div id="moveSelector" class="move-selector">
            <div class="status" id="selectorStatus">Select First Move</div>
            <button class="btn" onclick="selectFirstPlayer('X')">Player 1 First (X)</button>
            <button class="btn" onclick="selectFirstPlayer('O')">Player 2 First (O)</button>
        </div>

        <div class="board" id="board">
            <button class="box" data-index="0"></button>
            <button class="box" data-index="1"></button>
            <button class="box" data-index="2"></button>
            <button class="box" data-index="3"></button>
            <button class="box" data-index="4"></button>
            <button class="box" data-index="5"></button>
            <button class="box" data-index="6"></button>
            <button class="box" data-index="7"></button>
            <button class="box" data-index="8"></button>
        </div>

        <div id="gameOverMsg"></div>

        <div class="controls">
            <button id="startBtn" class="btn" onclick="startGame()" style="display: none;">Start Game</button>
            <button id="restartBtn" class="btn" onclick="restartGame()">Restart Game</button>
            <button id="backBtn" class="btn" onclick="undoMove()" disabled>Back Move</button>
        </div>
    </div>

    <audio id="tapSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhQ4+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhQ4=" type="audio/wav">
    </audio>

    <script>
        const board = document.getElementById('board');
        const boxes = document.querySelectorAll('.box');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const startBtn = document.getElementById('startBtn');
        const moveSelector = document.getElementById('moveSelector');
        const timer1 = document.getElementById('timer1');
        const timer2 = document.getElementById('timer2');
        const backBtn = document.getElementById('backBtn');
        const tapSound = document.getElementById('tapSound');

        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = false;
        let moveHistory = [];
        let firstPlayer = null;
        let timerInterval;
        let timeLeft = 0;
        let isTimerRunning = false;
        let currentMoveNumber = 0;
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        boxes.forEach(box => {
            box.addEventListener('click', handleClick);
        });

        function playSound() {
            tapSound.currentTime = 0;
            tapSound.play().catch(e => console.log('Sound play failed'));
        }

        function selectFirstPlayer(player) {
            firstPlayer = player;
            currentPlayer = player;
            document.getElementById('selectorStatus').innerText = `${player === 'X' ? 'Player 1' : 'Player 2'} starts first!`;
            startBtn.style.display = 'block';
            setTimeout(() => {
                moveSelector.classList.add('hidden');
            }, 1000);
        }

        function startGame() {
            gameActive = true;
            currentMoveNumber = 0;
            nextTurn();
        }

        function handleClick(e) {
            if (!gameActive || e.target.textContent !== '') return;
            
            const index = e.target.dataset.index;
            gameBoard[index] = currentPlayer;
            e.target.textContent = currentPlayer;
            e.target.classList.add(currentPlayer.toLowerCase());
            playSound();
            
            moveHistory.push(index);
            currentMoveNumber++;
            
            if (checkWinner()) {
                setTimeout(() => showWinner(currentPlayer), 500);
                return;
            }
            
            if (currentMoveNumber === 9) {
                showDraw();
                return;
            }
            
            switchPlayer();
            nextTurn();
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function nextTurn() {
            clearInterval(timerInterval);
            const timeLimit = currentMoveNumber <= 1 ? 3 : 4;
            timeLeft = timeLimit;
            isTimerRunning = true;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    opponentWins();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const playerTimer = currentPlayer === 'X' ? timer1 : timer2;
            const otherTimer = currentPlayer === 'X' ? timer2 : timer1;
            playerTimer.textContent = String(timeLeft).padStart(2, '0');
            playerTimer.classList.add('pulse');
            setTimeout(() => playerTimer.classList.remove('pulse'), 1000);
            otherTimer.textContent = '00';
        }

        function opponentWins() {
            const winner = currentPlayer === 'X' ? 'O' : 'X';
            showWinner(winner);
        }

        function checkWinner() {
            return winPatterns.some(pattern => {
                const [a, b, c] = pattern;
                return gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c];
            });
        }

        function showWinner(winner) {
            gameActive = false;
            clearInterval(timerInterval);
            gameOverMsg.textContent = `${winner} Wins! 🎉`;
            gameOverMsg.style.display = 'block';
            gameOverMsg.classList.add('winner-animation');
            
            // Highlight winning line (simplified)
            boxes.forEach((box, i) => {
                box.style.background = 'gold';
            });
            
            backBtn.disabled = true;
        }

        function showDraw() {
            gameActive = false;
            clearInterval(timerInterval);
            gameOverMsg.textContent = 'Draw!';
            gameOverMsg.style.display = 'block';
            backBtn.disabled = true;
        }

        function restartGame() {
            gameActive = false;
            clearInterval(timerInterval);
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            moveHistory = [];
            currentMoveNumber = 0;
            boxes.forEach(box => {
                box.textContent = '';
                box.className = 'box';
                box.style.background = 'rgba(255,255,255,0.9)';
            });
            gameOverMsg.style.display = 'none';
            moveSelector.classList.remove('hidden');
            startBtn.style.display = 'none';
            backBtn.disabled = true;
            timer1.textContent = '00';
            timer2.textContent = '00';
            currentPlayer = firstPlayer || 'X';
        }

        function undoMove() {
            if (moveHistory.length === 0 || !gameActive) return;
            
            const lastIndex = moveHistory.pop();
            gameBoard[lastIndex] = '';
            boxes[lastIndex].textContent = '';
            boxes[lastIndex].className = 'box';
            currentMoveNumber--;
            
            // Restore previous player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            nextTurn();
            
            backBtn.disabled = moveHistory.length === 0;
        }

        // Initial setup
        moveSelector.classList.remove('hidden');
        backBtn.disabled = true;
    </script>
</body>
</html>
